<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>minting...</title>
    <link rel="icon" type="image/png" href="../logo.png" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="../dashboard/styles.css" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }

      body.theme-page {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 10%, #edf4f8 0%, #dfe9ef 48%, #d3dde5 100%);
        font-family: var(--font-sans);
        padding: 20px;
      }

      .preview.preview-standalone {
        position: static;
        top: auto;
        max-height: none;
        overflow: visible;
        padding: 0;
        gap: 0;
      }

      .preview.preview-standalone .preview-linkbar {
        display: none;
      }

      .preview.preview-standalone .phone {
        width: 334px;
        height: 710px;
      }
    </style>
  </head>
  <body class="theme-page">
    <aside class="preview preview-standalone">
      <div class="phone" id="themePhone">
        <div class="phone-scroll">
          <div class="phone-header">
            <div class="phone-avatar" id="previewAvatar">
              <span class="avatar-initials" id="previewInitials"></span>
            </div>
            <div class="phone-name" id="previewName"></div>
            <div class="phone-bio" id="previewBio"></div>
          </div>

          <div class="phone-banner-marquee" id="previewBannerMarquee"></div>
          <div class="phone-links" id="previewLinks"></div>

          <div class="phone-footer-group">
            <div class="phone-social" id="previewSocialIcons"></div>
            <div class="phone-cta-text" id="previewCta"></div>
          </div>
        </div>

        <div class="phone-bottom-banner" id="previewInboxBanner"></div>
        <div class="phone-sheet-backdrop" id="previewInboxSheetBackdrop"></div>
        <div class="phone-bottom-sheet" id="previewInboxSheet">
          <div class="sheet-handle"></div>
          <div class="sheet-header">
            <span id="previewInboxSheetTitle"></span>
            <button class="icon-btn-sm" type="button" id="previewInboxSheetClose" aria-label="Close form">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <form class="sheet-form" id="previewInboxForm"></form>
        </div>
      </div>
    </aside>

    <script>
      const fitnessConfig = {
        profile: {
          name: "Coach Rin",
          username: "coachrin.fit",
          bio: "Strength coach • Mobility specialist • Online transformations",
          avatarImage: "03-assets/avatar-coach.svg",
        },
        appearance: {
          backgroundImage: "03-assets/bg-fitness.svg",
          backgroundColor: "#eff4f8",
          profileFontColor: "#ebf7ff",
          buttonColor: "#0f1720",
          buttonFontColor: "#f4fbff",
        },
        visibility: {
          showProfileImage: true,
          showDisplayName: true,
          showBio: true,
          showSocialIcons: true,
          showFooterCta: true,
        },
        footerCta: "WEMINT.LINK/FITNESS/>_MAKE YOURS",
        socialIcons: ["tiktok", "instagram", "youtube", "x"],
        links: [
          { id: "split", title: "Weekly Workout Split", featured: true, thumbnail: "03-assets/featured-workout.svg", enabled: true },
          { id: "bootcamp", title: "30-Day Bootcamp", featured: true, thumbnail: "03-assets/banner-challenge.svg", enabled: true },
          { id: "coaching", title: "Apply for Coaching", featured: false, enabled: true },
          { id: "library", title: "Exercise Library", featured: false, enabled: true },
          { id: "meal", title: "Meal Plan Pack", featured: false, enabled: true },
          { id: "supplements", title: "Supplements Guide", featured: false, enabled: true },
        ],
        banner: {
          enabled: true,
          items: [
            { image: "03-assets/banner-challenge.svg", hasLink: true, url: "#", showPrice: true, price: "14", unit: "DAYS" },
            { image: "03-assets/banner-meal.svg", hasLink: true, url: "#", showPrice: true, price: "29", unit: "USD" },
            { image: "03-assets/banner-challenge.svg", hasLink: true, url: "#" },
          ],
        },
        inbox: {
          name: "Start Coaching",
          layout: "banner",
          enabled: true,
          fields: [
            { id: "goal", label: "Main Fitness Goal", required: false, type: "text" },
            { id: "training", label: "Training Days / Week", required: false, type: "text" },
            { id: "injury", label: "Injury or Limitations", required: false, type: "textarea" },
          ],
        },
        order: ["split", "bootcamp", "banner", "coaching", "library", "meal", "supplements", "inbox"],
      };

      const elements = {
        phone: document.getElementById("themePhone"),
        previewAvatar: document.getElementById("previewAvatar"),
        previewInitials: document.getElementById("previewInitials"),
        previewName: document.getElementById("previewName"),
        previewBio: document.getElementById("previewBio"),
        previewBannerMarquee: document.getElementById("previewBannerMarquee"),
        previewLinks: document.getElementById("previewLinks"),
        previewSocialIcons: document.getElementById("previewSocialIcons"),
        previewCta: document.getElementById("previewCta"),
        previewInboxBanner: document.getElementById("previewInboxBanner"),
        previewInboxSheetBackdrop: document.getElementById("previewInboxSheetBackdrop"),
        previewInboxSheet: document.getElementById("previewInboxSheet"),
        previewInboxSheetClose: document.getElementById("previewInboxSheetClose"),
        previewInboxSheetTitle: document.getElementById("previewInboxSheetTitle"),
        previewInboxForm: document.getElementById("previewInboxForm"),
      };

      const SOCIAL_ICON_MAP = {
        tiktok: '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>',
        youtube: '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>',
        x: '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
        instagram: '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>',
      };

      function escapeHTML(str) {
        const div = document.createElement("div");
        div.textContent = String(str ?? "");
        return div.innerHTML;
      }

      function getInitials(name) {
        if (!name) return "??";
        const parts = String(name).trim().split(/\s+/).filter(Boolean);
        if (!parts.length) return "??";
        if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
        return `${parts[0][0]}${parts[parts.length - 1][0]}`.toUpperCase();
      }

      function setInboxSheetOpen(value) {
        elements.previewInboxSheet.classList.toggle("is-open", value);
        elements.previewInboxSheetBackdrop.classList.toggle("is-open", value);
        elements.previewInboxSheetTitle.textContent = fitnessConfig.inbox.name;
      }

      function renderSocialIcons() {
        if (!fitnessConfig.visibility.showSocialIcons) {
          elements.previewSocialIcons.style.display = "none";
          return;
        }
        elements.previewSocialIcons.style.display = "flex";
        elements.previewSocialIcons.innerHTML = fitnessConfig.socialIcons
          .map((name) => `<span class="social-icon">${SOCIAL_ICON_MAP[name] || ""}</span>`)
          .join("");
      }

      function renderBannerMarquee() {
        const items = fitnessConfig.banner.items;
        const shouldShow = fitnessConfig.banner.enabled && items.length >= 3;

        elements.previewBannerMarquee.classList.toggle("is-visible", shouldShow);
        if (!shouldShow) {
          elements.previewBannerMarquee.innerHTML = "";
          return false;
        }

        const content = items.map((item) => {
          const price = item.showPrice && item.price
            ? `<span class="marquee-price">${escapeHTML(item.price)}${item.unit ? ` ${escapeHTML(item.unit)}` : ""}</span>`
            : "";
          const inner = `<img src="${escapeHTML(item.image)}" alt="" />${price}`;
          return item.hasLink
            ? `<a class="marquee-item" href="${escapeHTML(item.url || '#')}" target="_blank" rel="noopener noreferrer">${inner}</a>`
            : `<div class="marquee-item is-static">${inner}</div>`;
        }).join("");

        elements.previewBannerMarquee.innerHTML = `<div class="marquee-track">${content}${content}</div>`;
        return true;
      }

      function renderInboxBanner() {
        const visible = fitnessConfig.inbox.enabled && fitnessConfig.inbox.layout === "banner";
        elements.previewInboxBanner.classList.toggle("is-visible", visible);

        if (!visible) {
          elements.previewInboxBanner.innerHTML = "";
          return;
        }

        elements.previewInboxBanner.className = "phone-bottom-banner is-visible";
        elements.previewInboxBanner.innerHTML = `
          <div class="banner-handle">
            <div class="banner-title">${escapeHTML(fitnessConfig.inbox.name)}</div>
            <button class="banner-toggle" type="button" aria-label="Open form">
              <span class="material-symbols-outlined">keyboard_arrow_up</span>
            </button>
          </div>
        `;

        elements.previewInboxBanner.querySelector(".banner-toggle")?.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          setInboxSheetOpen(true);
        });
        elements.previewInboxBanner.addEventListener("click", () => setInboxSheetOpen(true));
      }

      function renderInboxForm() {
        const fieldsHTML = fitnessConfig.inbox.fields.map((field) => {
          const label = `${escapeHTML(field.label)}${field.required ? "" : " (optional)"}`;
          const required = field.required ? "required" : "";

          if (field.type === "textarea") {
            return `<label class="sheet-field"><span>${label}</span><textarea placeholder="${escapeHTML(field.label)}" ${required}></textarea></label>`;
          }

          const inputType = field.type === "date" || field.type === "email" || field.type === "tel" ? field.type : "text";
          return `<label class="sheet-field"><span>${label}</span><input type="${inputType}" placeholder="${escapeHTML(field.label)}" ${required} /></label>`;
        }).join("");

        elements.previewInboxForm.innerHTML = `
          ${fieldsHTML}
          <button class="sheet-submit" type="button" disabled>Send</button>
          <p class="sheet-footnote">By submitting, you agree to wemint.link's T&amp;Cs and Privacy Notice.</p>
        `;
      }

      function renderLinks() {
        elements.previewLinks.innerHTML = "";

        fitnessConfig.order.forEach((itemId) => {
          if (itemId === "banner") {
            const shown = renderBannerMarquee();
            if (shown) elements.previewLinks.appendChild(elements.previewBannerMarquee);
            return;
          }

          if (itemId === "inbox") {
            if (fitnessConfig.inbox.enabled && fitnessConfig.inbox.layout !== "banner") {
              const inboxItem = document.createElement("div");
              inboxItem.className = "phone-link inbox";
              inboxItem.innerHTML = `<span>${escapeHTML(fitnessConfig.inbox.name)}</span>`;
              inboxItem.addEventListener("click", () => setInboxSheetOpen(true));
              elements.previewLinks.appendChild(inboxItem);
            }
            renderInboxBanner();
            return;
          }

          const link = fitnessConfig.links.find((entry) => entry.id === itemId);
          if (!link || !link.enabled) return;

          const node = document.createElement("div");
          if (link.featured) {
            node.className = "phone-link featured";
            node.innerHTML = `
              <div class="phone-link-thumb"><img src="${escapeHTML(link.thumbnail)}" alt="" /></div>
              <div class="phone-link-bottom">
                <span>${escapeHTML(link.title)}</span>
                <span class="phone-link-more"><span class="material-symbols-outlined">more_vert</span></span>
              </div>
            `;
          } else {
            node.className = "phone-link";
            node.innerHTML = `
              <div class="phone-link-icon"><span class="material-symbols-outlined">star_shine</span></div>
              <span>${escapeHTML(link.title)}</span>
              <span class="phone-link-more"><span class="material-symbols-outlined">more_vert</span></span>
            `;
          }
          elements.previewLinks.appendChild(node);
        });
      }

      function applyTheme() {
        const { profile, appearance, visibility } = fitnessConfig;

        elements.previewName.textContent = profile.name;
        elements.previewBio.textContent = profile.bio;
        elements.previewName.style.display = visibility.showDisplayName ? "" : "none";
        elements.previewBio.style.display = visibility.showBio ? "" : "none";

        elements.phone.style.setProperty("--phone-profile-color", appearance.profileFontColor);
        elements.phone.style.setProperty("--phone-link-color", appearance.buttonColor);
        elements.phone.style.setProperty("--phone-link-text", appearance.buttonFontColor);
        elements.phone.style.backgroundColor = appearance.backgroundColor;
        elements.phone.style.backgroundImage = `url(${appearance.backgroundImage})`;

        const hasImage = Boolean(profile.avatarImage);
        elements.previewAvatar.style.display = visibility.showProfileImage ? "" : "none";
        elements.previewAvatar.style.backgroundImage = hasImage ? `url(${profile.avatarImage})` : "none";
        elements.previewAvatar.style.backgroundSize = "cover";
        elements.previewAvatar.style.backgroundPosition = "center";
        elements.previewAvatar.style.backgroundRepeat = "no-repeat";
        elements.previewAvatar.classList.toggle("has-image", hasImage);
        elements.previewAvatar.classList.toggle("has-initials", !hasImage);
        elements.previewInitials.textContent = getInitials(profile.name);

        elements.previewCta.textContent = fitnessConfig.footerCta;
        elements.previewCta.style.display = visibility.showFooterCta ? "block" : "none";
      }

      applyTheme();
      renderSocialIcons();
      renderLinks();
      renderInboxForm();

      elements.previewInboxSheetClose?.addEventListener("click", () => setInboxSheetOpen(false));
      elements.previewInboxSheetBackdrop?.addEventListener("click", () => setInboxSheetOpen(false));
    </script>
  </body>
</html>
