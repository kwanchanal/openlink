<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>minting...</title>
    <link rel="icon" type="image/png" href="../favicon/logo.png" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }

      body.theme-page {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #eef0f3;
        font-family: var(--font-sans);
        padding: 20px;
      }

      .preview.preview-standalone {
        position: static;
        top: auto;
        max-height: none;
        overflow: visible;
        padding: 0;
        gap: 0;
      }

      .preview.preview-standalone .preview-linkbar {
        display: none;
      }

      .preview.preview-standalone .phone {
        width: 320px;
        height: 680px;
      }
    </style>
  </head>
  <body class="theme-page">
    <aside class="preview preview-standalone">
      <div class="phone" id="themePhone">
        <div class="phone-scroll">
          <div class="phone-header">
            <div class="phone-avatar" id="previewAvatar">
              <svg class="avatar-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true">
                <path d="M360-390q-21 0-35.5-14.5T310-440q0-21 14.5-35.5T360-490q21 0 35.5 14.5T410-440q0 21-14.5 35.5T360-390Zm240 0q-21 0-35.5-14.5T550-440q0-21 14.5-35.5T600-490q21 0 35.5 14.5T650-440q0 21-14.5 35.5T600-390ZM480-160q134 0 227-93t93-227q0-24-3-46.5T786-570q-21 5-42 7.5t-44 2.5q-91 0-172-39T390-708q-32 78-91.5 135.5T160-486v6q0 134 93 227t227 93Zm0 80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm-54-715q42 70 114 112.5T700-640q14 0 27-1.5t27-3.5q-42-70-114-112.5T480-800q-14 0-27 1.5t-27 3.5ZM177-581q51-29 89-75t57-103q-51 29-89 75t-57 103Zm249-214Zm-103 36Z"/>
              </svg>
              <span class="avatar-initials" id="previewInitials"></span>
            </div>
            <div class="phone-name" id="previewName">Kwanchanal Grographic</div>
            <div class="phone-bio" id="previewBio">Retired designer turned FinTech Product Manager, Mostly underwater</div>
          </div>

          <div class="phone-banner-marquee" id="previewBannerMarquee"></div>
          <div class="phone-links" id="previewLinks"></div>

          <div class="phone-footer-group">
            <div class="phone-social" id="previewSocialIcons">
              <span class="social-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
              </span>
              <span class="social-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
              </span>
              <span class="social-icon">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              </span>
              <span class="social-icon">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>
              </span>
            </div>
            <div class="phone-cta-text" id="previewCta">WEMINT.LINK/YOU/&gt;_MAKE YOURS</div>
          </div>
        </div>

        <div class="phone-bottom-banner" id="previewInboxBanner"></div>
        <div class="phone-sheet-backdrop" id="previewInboxSheetBackdrop"></div>
        <div class="phone-bottom-sheet" id="previewInboxSheet">
          <div class="sheet-handle"></div>
          <div class="sheet-header">
            <span id="previewInboxSheetTitle">Get in touch</span>
            <button class="icon-btn-sm" type="button" id="previewInboxSheetClose" aria-label="Close form">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div>
          <form class="sheet-form" id="previewInboxForm"></form>
        </div>
      </div>
    </aside>

    <script>
      const storage = {
        get(key, fallback) {
          try {
            const raw = localStorage.getItem(key);
            return raw ? JSON.parse(raw) : fallback;
          } catch {
            return fallback;
          }
        },
      };

      const defaultProfile = {
        name: "Kwanchanal Grographic",
        username: "kwan",
        bio: "Retired designer turned FinTech Product Manager, Mostly underwater",
      };

      const defaultLinks = [
        {
          id: "default-founder",
          title: "founder",
          hasUrl: true,
          url: "https://wemint.link",
          thumbnail: "",
          featured: false,
          enabled: true,
        },
        {
          id: "default-portfolio",
          title: "portfolio",
          hasUrl: true,
          url: "https://kwanchanal.github.io/hello",
          thumbnail: "",
          featured: true,
          enabled: true,
        },
      ];

      const defaultBannerItems = [];

      const defaultAppearance = {
        profileImageUrl: "",
        backgroundImageUrl: "",
        backgroundColor: "#ffffff",
        buttonColor: "#000000",
        profileFontColor: "#111827",
        buttonFontColor: "#f9fafb",
      };

      const visibility = storage.get("wemint_visibility", {
        showProfileImage: true,
        showDisplayName: true,
        showBio: true,
        showSocialIcons: true,
      });

      const profile = storage.get("wemint_profile", defaultProfile);
      const appearance = storage.get("wemint_appearance", defaultAppearance);
      const linksRaw = storage.get("wemint_links", defaultLinks);
      let links = Array.isArray(linksRaw) ? linksRaw.slice() : defaultLinks.slice();

      links = links.map((link, index) => {
        const nextUrl = String(link?.url || "").trim();
        const nextHasUrl = typeof link?.hasUrl === "boolean" ? link.hasUrl : Boolean(nextUrl);
        return {
          id: link?.id || `link-${index}`,
          title: String(link?.title || "Untitled"),
          hasUrl: nextHasUrl,
          url: nextHasUrl ? nextUrl : "",
          thumbnail: String(link?.thumbnail || ""),
          featured: Boolean(link?.featured),
          enabled: typeof link?.enabled === "boolean" ? link.enabled : true,
        };
      });

      let inboxName = storage.get("wemint_inbox_name", "Get in touch");
      const rawInboxPosition = localStorage.getItem("wemint_inbox_position");
      const rawBannerPosition = localStorage.getItem("wemint_banner_position");
      let inboxPosition = Number(rawInboxPosition ?? links.length + 1);
      let bannerPosition = Number(rawBannerPosition ?? links.length);
      if (Number.isNaN(inboxPosition)) inboxPosition = links.length + 1;
      if (Number.isNaN(bannerPosition)) bannerPosition = links.length;

      let inboxLayout = storage.get("wemint_inbox_layout", { type: "banner", thumbnail: "" });
      if (typeof inboxLayout.featured === "boolean") {
        inboxLayout = { type: inboxLayout.featured ? "banner" : "classic", thumbnail: inboxLayout.thumbnail || "" };
      }

      const savedBannerItems = storage.get("wemint_banner_items", null);
      let bannerItems = Array.isArray(savedBannerItems) && savedBannerItems.length ? savedBannerItems : defaultBannerItems;
      bannerItems = bannerItems
        .map((item, index) => {
          const nextUrl = String(item?.url || "").trim();
          const nextHasLink = typeof item?.hasLink === "boolean" ? item.hasLink : Boolean(nextUrl);
          return {
            id: item?.id || `banner-${index}`,
            image: String(item?.image || ""),
            hasLink: nextHasLink,
            url: nextHasLink ? nextUrl : "",
            showPrice: Boolean(item?.showPrice),
            price: String(item?.price || ""),
            unit: String(item?.unit || ""),
          };
        })
        .filter((item) => item.image && (!item.hasLink || item.url));

      if (!bannerItems.length) bannerItems = defaultBannerItems.slice();

      let bannerEnabled = Boolean(storage.get("wemint_banner_enabled", true));
      if (bannerItems.length < 3) bannerEnabled = false;
      const defaultInboxFields = [
        { id: "inbox-name", label: "Name", required: false, type: "text" },
        { id: "inbox-email", label: "Email address", required: true, type: "email" },
        { id: "inbox-phone", label: "Phone number", required: true, type: "tel" },
        { id: "inbox-booking", label: "Booking Date", required: true, type: "date" },
      ];
      let inboxFormFields = storage.get("wemint_inbox_fields", defaultInboxFields);
      if (!Array.isArray(inboxFormFields) || !inboxFormFields.length) {
        inboxFormFields = defaultInboxFields.slice();
      }
      inboxFormFields = inboxFormFields.map((field, index) => ({
        id: field?.id || `field-${index}`,
        label: String(field?.label || "Untitled"),
        required: Boolean(field?.required),
        type: String(field?.type || "text"),
      }));

      const elements = {
        phone: document.getElementById("themePhone"),
        previewAvatar: document.getElementById("previewAvatar"),
        previewInitials: document.getElementById("previewInitials"),
        previewName: document.getElementById("previewName"),
        previewBio: document.getElementById("previewBio"),
        previewBannerMarquee: document.getElementById("previewBannerMarquee"),
        previewLinks: document.getElementById("previewLinks"),
        previewSocialIcons: document.getElementById("previewSocialIcons"),
        previewCta: document.getElementById("previewCta"),
        previewInboxBanner: document.getElementById("previewInboxBanner"),
        previewInboxSheetBackdrop: document.getElementById("previewInboxSheetBackdrop"),
        previewInboxSheet: document.getElementById("previewInboxSheet"),
        previewInboxSheetClose: document.getElementById("previewInboxSheetClose"),
        previewInboxSheetTitle: document.getElementById("previewInboxSheetTitle"),
        previewInboxForm: document.getElementById("previewInboxForm"),
      };

      function escapeHTML(str) {
        const div = document.createElement("div");
        div.textContent = String(str ?? "");
        return div.innerHTML;
      }

      function getInitials(name) {
        if (!name) return "??";
        const parts = String(name).trim().split(/\s+/).filter(Boolean);
        if (!parts.length) return "??";
        if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
        return `${parts[0][0]}${parts[parts.length - 1][0]}`.toUpperCase();
      }

      function isBannerReady() {
        return bannerItems.length >= 3;
      }

      function getCombinedOrder() {
        const order = links.map((link) => link.id);
        const specials = [
          { id: "inbox", position: inboxPosition },
          { id: "banner", position: bannerPosition },
        ].sort((a, b) => a.position - b.position || a.id.localeCompare(b.id));

        specials.forEach((special) => {
          const clamped = Math.max(0, Math.min(special.position, order.length));
          order.splice(clamped, 0, special.id);
        });

        return order;
      }

      function renderPreviewBannerMarquee() {
        const shouldShow = bannerEnabled && isBannerReady();
        elements.previewBannerMarquee.classList.toggle("is-visible", shouldShow);

        if (!shouldShow) {
          elements.previewBannerMarquee.innerHTML = "";
          return false;
        }

        const content = bannerItems
          .map((item) => {
            const price = item.showPrice && item.price
              ? `<span class="marquee-price">${escapeHTML(item.price)}${item.unit ? ` ${escapeHTML(item.unit)}` : ""}</span>`
              : "";

            const inner = `<img src="${escapeHTML(item.image)}" alt="" />${price}`;

            if (item.hasLink && item.url) {
              return `<a class="marquee-item" href="${escapeHTML(item.url)}" target="_blank" rel="noopener noreferrer">${inner}</a>`;
            }

            return `<div class="marquee-item is-static">${inner}</div>`;
          })
          .join("");

        elements.previewBannerMarquee.innerHTML = `<div class="marquee-track">${content}${content}</div>`;
        return true;
      }

      function renderInboxBanner() {
        const isBanner = inboxLayout.type === "banner";
        const isVisible = isBanner;
        elements.previewInboxBanner.classList.toggle("is-visible", Boolean(isVisible));

        if (!isVisible) {
          elements.previewInboxBanner.innerHTML = "";
          return;
        }

        elements.previewInboxBanner.className = "phone-bottom-banner is-visible";
        elements.previewInboxBanner.innerHTML = `
          <div class="banner-handle">
            <div class="banner-title">${escapeHTML(inboxName)}</div>
            <button class="banner-toggle" type="button" aria-label="Open form">
              <span class="material-symbols-outlined">keyboard_arrow_up</span>
            </button>
          </div>
        `;

        const toggleBtn = elements.previewInboxBanner.querySelector(".banner-toggle");
        if (toggleBtn) {
          toggleBtn.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            setInboxSheetOpen(true);
          });
        }
        elements.previewInboxBanner.addEventListener("click", () => setInboxSheetOpen(true));
      }

      function renderPreviewInboxForm() {
        if (!elements.previewInboxForm) return;

        const fieldMarkup = inboxFormFields.map((field) => {
          const safeId = escapeHTML(field.id);
          const safeLabel = escapeHTML(field.label);
          const requiredText = field.required ? "" : " (optional)";

          if (field.type === "textarea") {
            return `
              <label class="sheet-field" for="${safeId}">
                <span>${safeLabel}${requiredText}</span>
                <textarea id="${safeId}" name="${safeId}" placeholder="${safeLabel}" ${field.required ? "required" : ""}></textarea>
              </label>
            `;
          }

          const inputType = field.type === "email" || field.type === "tel" || field.type === "date"
            ? field.type
            : "text";

          return `
            <label class="sheet-field" for="${safeId}">
              <span>${safeLabel}${requiredText}</span>
              <input id="${safeId}" name="${safeId}" type="${inputType}" placeholder="${safeLabel}" ${field.required ? "required" : ""} />
            </label>
          `;
        }).join("");

        elements.previewInboxForm.innerHTML = `
          ${fieldMarkup}
          <button class="sheet-submit" type="button" disabled>Send</button>
          <p class="sheet-footnote">By submitting, you agree to wemint.link's T&amp;Cs and Privacy Notice.</p>
        `;
      }

      function setInboxSheetOpen(value) {
        if (!elements.previewInboxSheet || !elements.previewInboxSheetBackdrop) return;
        elements.previewInboxSheet.classList.toggle("is-open", value);
        elements.previewInboxSheetBackdrop.classList.toggle("is-open", value);
        if (elements.previewInboxSheetTitle) {
          elements.previewInboxSheetTitle.textContent = inboxName;
        }
      }

      function applyProfileAndAppearance() {
        elements.previewName.textContent = profile.name || defaultProfile.name;
        elements.previewBio.textContent = profile.bio || defaultProfile.bio;

        elements.previewName.style.display = visibility.showDisplayName ? "" : "none";
        elements.previewBio.style.display = visibility.showBio ? "" : "none";
        elements.previewSocialIcons.style.display = visibility.showSocialIcons ? "" : "none";

        elements.phone.style.setProperty("--phone-profile-color", appearance.profileFontColor || "#111827");
        elements.phone.style.setProperty("--phone-button-color", appearance.buttonColor || "#000000");
        elements.phone.style.setProperty("--phone-button-text", appearance.buttonFontColor || "#f9fafb");
        elements.phone.style.setProperty("--phone-link-color", appearance.buttonColor || "#000000");
        elements.phone.style.setProperty("--phone-link-text", appearance.buttonFontColor || "#f9fafb");

        elements.phone.style.backgroundColor = appearance.backgroundColor || "#ffffff";
        elements.phone.style.backgroundImage = appearance.backgroundImageUrl
          ? `url(${appearance.backgroundImageUrl})`
          : "none";

        const hasImage = Boolean(appearance.profileImageUrl);
        elements.previewAvatar.style.display = visibility.showProfileImage ? "" : "none";
        elements.previewAvatar.style.backgroundImage = hasImage ? `url(${appearance.profileImageUrl})` : "none";
        elements.previewAvatar.style.backgroundSize = "cover";
        elements.previewAvatar.style.backgroundPosition = "center";
        elements.previewAvatar.style.backgroundRepeat = "no-repeat";
        elements.previewAvatar.classList.toggle("has-image", hasImage);

        const initials = getInitials(profile.name);
        elements.previewInitials.textContent = initials;
        elements.previewAvatar.classList.toggle("has-initials", !hasImage);
      }

      function renderPreview() {
        elements.previewLinks.innerHTML = "";
        const order = getCombinedOrder();

        order.forEach((itemId) => {
          if (itemId === "banner") {
            const shouldShowBanner = renderPreviewBannerMarquee();
            if (shouldShowBanner) {
              elements.previewLinks.appendChild(elements.previewBannerMarquee);
            }
            return;
          }

          if (itemId === "inbox") {
            if (inboxLayout.type !== "banner") {
              const inboxItem = document.createElement("div");
              inboxItem.className = "phone-link inbox";
              inboxItem.innerHTML = `<span>${escapeHTML(inboxName)}</span>`;
              inboxItem.addEventListener("click", () => setInboxSheetOpen(true));
              elements.previewLinks.appendChild(inboxItem);
            }
            renderInboxBanner();
            return;
          }

          const link = links.find((entry) => entry.id === itemId);
          if (!link || !link.enabled) return;

          const btn = document.createElement("div");
          const safeTitle = escapeHTML(link.title);

          if (link.featured) {
            btn.className = "phone-link featured";
            const thumbContent = link.thumbnail ? `<img src="${escapeHTML(link.thumbnail)}" alt="" />` : "";
            btn.innerHTML = `
              <div class="phone-link-thumb">${thumbContent}</div>
              <div class="phone-link-bottom">
                <span>${safeTitle}</span>
                <span class="phone-link-more"><span class="material-symbols-outlined">more_vert</span></span>
              </div>
            `;
          } else {
            btn.className = "phone-link";
            btn.innerHTML = `
              <div class="phone-link-icon"><span class="material-symbols-outlined">star_shine</span></div>
              <span>${safeTitle}</span>
              <span class="phone-link-more"><span class="material-symbols-outlined">more_vert</span></span>
            `;
          }

          elements.previewLinks.appendChild(btn);
        });

        if (!elements.previewInboxBanner.classList.contains("is-visible")) {
          elements.previewInboxBanner.innerHTML = "";
        }

        elements.previewCta.style.display = "block";
        renderPreviewInboxForm();
      }

      applyProfileAndAppearance();
      renderPreview();
      if (elements.previewInboxSheetClose) {
        elements.previewInboxSheetClose.addEventListener("click", () => setInboxSheetOpen(false));
      }
      if (elements.previewInboxSheetBackdrop) {
        elements.previewInboxSheetBackdrop.addEventListener("click", () => setInboxSheetOpen(false));
      }

      window.addEventListener("storage", () => {
        location.reload();
      });
    </script>
  </body>
</html>
